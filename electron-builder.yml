appId: gg.hydralauncher.hydra
productName: Hydra
directories:
  buildResources: build
extraResources:
  - ludusavi
  - hydra-python-rpc
  - hydra-native
  - seeds
  - from: resources/achievement.wav
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!native/hydra-native/target"
  - "!native/hydra-native/target/**"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,tsconfig.test.json}"
  - "!scripts/register-ts-node.mjs"
asarUnpack:
  - resources/**
  - node_modules/sharp/**
  - node_modules/@img/sharp-libvips-*/**
linux:
  extraResources:
    - from: binaries/7zzs
    - from: binaries/umu/umu-run
  target:
    - AppImage
    - deb
    - rpm
  maintainer: electronjs.org
  category: Game
  mimeTypes:
    - x-scheme-handler/hydralauncher
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: CappyT
  repo: hydra
